name: Release Debian Package

on:
  push:
    tags:
      - 'v*'

jobs:
  build-deb:
    permissions:
      contents: write

    name: Generate Debian Package
    runs-on: ubuntu-latest

    env:
      RUSTFLAGS: "-D warnings"
      SQLX_OFFLINE: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7
        with:
          toolchain: stable

      - name: Install cargo-deb
        uses: taiki-e/install-action@3235f8901fd37ffed0052b276cec25a362fb82e9
        with:
          tool: cargo-deb

      - name: Build Debian package
        # `--strip` runs `strip --strip-all`, which also drops the
        # `.comment` section that `[profile.release] strip = true` leaves
        # behind. cargo-deb has no option to add an md5sums control file,
        # so it is generated below.
        run: cargo deb --strip

      - name: Add md5sums control file
        run: |
          set -euo pipefail
          deb=$(ls target/debian/*.deb)
          tmp=$(mktemp -d)
          dpkg-deb -R "$deb" "$tmp"
          (cd "$tmp" && find . -type f ! -path './DEBIAN/*' -printf '%P\0' \
            | LC_ALL=C sort -z \
            | xargs -0 md5sum > DEBIAN/md5sums)
          chmod 644 "$tmp/DEBIAN/md5sums"
          dpkg-deb --root-owner-group -b "$tmp" "$deb"
          rm -rf "$tmp"

      - name: Run lintian
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends lintian
          lintian --display-experimental --info --display-info --pedantic \
                  --tag-display-limit 0 --color auto target/debian/*.deb

      - name: Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          draft: true
          files: target/debian/*.deb
          fail_on_unmatched_files: true
