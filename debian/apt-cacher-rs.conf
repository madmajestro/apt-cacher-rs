# Minimum log level severity to output.
# Can be overridden via program options.
#log_level = 'info'

# Path to log file.
# The special value `console` will output to the console.
#log_file = 'console'

# Address to listen on.
#bind_addr = '::'

# Port to listen on.
#bind_port = 3142

# Path to database.
#database_path = '/var/lib/apt-cacher-rs/apt-cacher-rs.db'

# Path to cache directory.
#cache_directory = '/var/cache/apt-cacher-rs'

# Timeout of database operations after which a warning is generated.
# Takes a floating point number as number of seconds.
#database_slow_timeout = 2

# Timeout for http operations.
# Takes a floating point number as number of seconds.
#http_timeout = 10

# HTTPS upgrade mode.
# Can be one of 'Auto', 'Always', or 'Never'.
#https_upgrade_mode = 'Auto'

# Size of buffer (in bytes) used for internal data transfer.
#buffer_size = '32Ki'

# Number of stored error and warning log messages.
#logstore_capacity = 100

# Disk quota (in bytes) for cache.
# 0 means unlimited.
#disk_quota = '0'

# Retention time (in days) for files acquired "by-hash".
#byhash_retention_days = 90

# Retention time for usage logs.
# Takes an amount of days, use `0` to never delete.
#usage_retention_days = 30

# Minimum transfer rate (in bytes per second) for downloads and uploads.
# Connections that fail to fulfill this limit are cancelled.
#min_download_rate = '10k'

# Sliding window (in seconds) over which the minimum transfer rate is measured.
#rate_check_timeframe = 30

# Maximum number of concurrent downloads of the proxy from
# upstream mirrors.
#max_upstream_downloads = 20

# Capacity of the internal database command channel.
#db_channel_capacity=128

# Maximum number of pending database events buffered before a batch flush.
#db_batch_flush_max_count = 256

# Interval (in seconds) between database batch flushes and mirror last_seen syncs.
#db_batch_flush_interval_secs = 15

# Threshold (in bytes) for using memory-mapped files for large downloads.
#mmap_threshold = 1Mi

# Mirror aliases.
# Cache content for a list of mirrors under a common name.
# The initial download is still fetched from the requetsed mirror,
# but content already in cache is served for any aliased mirror.
# Example:
#   aliases = [ [ 'deb.debian.org' , [ 'ftp.ca.debian.org' ] ] ]
#aliases = []

# List of allowed mirrors.
# Note that by default no mirrors are allowed.
# Example:
#   allowed_mirrors = [ 'deb.debian.org', '*.ubuntu.com' ]
#allowed_mirrors = []

# List of mirrors supporting only http.
# These mirrors are exempted from https upgrade.
# Note that the mirrors need to be allowed via 'allowed_mirrors'.
# Example:
#   http_only_mirrors = [ 'ftp.au.debian.org' ]
#http_only_mirrors = []

# List of clients permitted to use the proxy.
# If no clients are listed no restrictions are applied.
# Note that localhost is not implicitly allowed.
# Example:
#   allowed_proxy_clients = [ '192.168.0.0/16', '127.0.0.1' ]
#allowed_proxy_clients = []

# List of clients permitted to use the web interface.
# If left commented out all clients permitted to use the proxy are
# permitted.
# If no clients are specified no restrictions are applied.
# Note that localhost is not implicitly allowed.
# Example:
#   allowed_webif_clients = [ '192.168.0.0/16', '127.0.0.1' ]
#allowed_webif_clients = []

# Maximum number of concurrent connections per client IP.
# 0 means unlimited.
#max_connections_per_client_ip = 0

# Whether https tunneling is enabled.
#https_tunnel_enabled = true

# Allowed ports for https tunneling.
#https_tunnel_allowed_ports = [ 443 ]

# Allowed mirrors for https tunneling.
# Example:
#   https_tunnel_allowed_mirrors = [ 'ftp.ca.debian.org', 'metadata.ftp-master.debian.org' ]
#https_tunnel_allowed_mirrors = []

# Maximum number of concurrent HTTPS tunnel connections per client IP.
# 0 means unlimited.
#https_tunnel_max_connections_per_client = 10

# Whether to set TCP_NODELAY on upstream sockets.
#upstream_tcp_nodelay = true

# Whether to reject differential (pdiff) resource requests with 410 Gone.
# When disabled, diff requests are proxied to the upstream mirror but not cached
# (while full resources are always cached).
#reject_pdiff_requests = true
